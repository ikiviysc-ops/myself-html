<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAE 3D Icon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 3D 图标容器 */
.icon-container{
  width:300px;
  height:300px;
  position:relative;
}

/* 控制按钮 */
.controls{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  transition:all 0.2s;
}

button:hover{
  background:rgba(255,255,255,0.2);
}
</style>
</head>
<body>
  <div class="icon-container" id="iconContainer">
    <!-- Three.js 3D 场景将在这里渲染 -->
  </div>

  <div class="controls">
    <button onclick="resetRotation()">重置</button>
  </div>

  <!-- 引入Three.js核心库 -->
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    // 初始化场景、相机、渲染器
    const container = document.getElementById('iconContainer');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    
    // 透视相机
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(2, 2, 3);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);
    
    // 轨道控制
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 1.2;
    controls.zoomSpeed = 1.0;
    controls.enableZoom = true;
    controls.enablePan = false;
    controls.autoRotate = false;
    controls.target.set(0, 0, 0);
    
    // 光照系统
    // 环境光
    const ambientLight = new THREE.AmbientLight(0x404060, 0.55);
    scene.add(ambientLight);
    
    // 主光源方向光
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(3, 5, 2);
    dirLight.castShadow = true;
    dirLight.receiveShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 8;
    dirLight.shadow.camera.left = -5;
    dirLight.shadow.camera.right = 5;
    dirLight.shadow.camera.top = 5;
    dirLight.shadow.camera.bottom = -5;
    scene.add(dirLight);
    
    // 辅助背光暖色
    const backLight = new THREE.PointLight(0xffaa66, 0.6);
    backLight.position.set(-2, 1, -2.5);
    scene.add(backLight);
    
    // 冷色填充光
    const fillLight = new THREE.PointLight(0x2288ff, 0.5);
    fillLight.position.set(1.5, 1, 2);
    scene.add(fillLight);
    
    // 从底部打亮阴影区域
    const rimLight = new THREE.PointLight(0x44aaff, 0.4);
    rimLight.position.set(0, -1.2, 0.8);
    scene.add(rimLight);
    
    // 创建TRAE纹理
    const createTexture = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');
      
      // 背景渐变
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, '#2a2a2a');
      gradient.addColorStop(0.5, '#1a1a1a');
      gradient.addColorStop(1, '#0f0f0f');
      ctx.fillStyle = gradient;
      
      // 绘制圆角矩形背景
      const radius = 80;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(canvas.width - radius, 0);
      ctx.quadraticCurveTo(canvas.width, 0, canvas.width, radius);
      ctx.lineTo(canvas.width, canvas.height - radius);
      ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - radius, canvas.height);
      ctx.lineTo(radius, canvas.height);
      ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fill();
      
      // 绘制TRAE文字
      ctx.font = 'Bold 160px "Inter"';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      // 文字渐变
      const textGradient = ctx.createLinearGradient(0, 150, 0, 350);
      textGradient.addColorStop(0, '#ffffff');
      textGradient.addColorStop(0.5, '#e0e0e0');
      textGradient.addColorStop(1, '#b0b0b0');
      ctx.fillStyle = textGradient;
      
      ctx.fillText("TRAE", canvas.width/2, canvas.height/2);
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    };
    
    // 核心3D图标
    const iconGroup = new THREE.Group();
    
    // 1. 圆角立方体组件
    const coreTexture = createTexture();
    const boxWidth = 1.5;
    const boxHeight = 1.5;
    const boxDepth = 0.2;
    const cornerRadius = 0.15;
    
    // 正面/背面材质（带纹理）
    const faceMat = new THREE.MeshStandardMaterial({ 
      map: coreTexture, 
      roughness: 0.8, 
      metalness: 0.1,
      emissive: new THREE.Color(0x112266),
      emissiveIntensity: 0.05
    });
    
    // 侧面材质（纯色）
    const sideMat = new THREE.MeshStandardMaterial({ 
      color: '#1a1a1a', 
      roughness: 0.8, 
      metalness: 0.1,
      emissive: new THREE.Color(0x112266),
      emissiveIntensity: 0.05
    });
    
    // 中心主体Box
    const centerBoxGeo = new THREE.BoxGeometry(
      boxWidth - 2 * cornerRadius,
      boxHeight - 2 * cornerRadius,
      boxDepth
    );
    const centerBox = new THREE.Mesh(centerBoxGeo, sideMat);
    centerBox.castShadow = true;
    centerBox.receiveShadow = true;
    iconGroup.add(centerBox);
    
    // 水平延伸Box
    const horizontalBoxGeo = new THREE.BoxGeometry(
      boxWidth,
      boxHeight - 2 * cornerRadius,
      boxDepth
    );
    const horizontalBox = new THREE.Mesh(horizontalBoxGeo, sideMat);
    horizontalBox.castShadow = true;
    horizontalBox.receiveShadow = true;
    iconGroup.add(horizontalBox);
    
    // 垂直延伸Box
    const verticalBoxGeo = new THREE.BoxGeometry(
      boxWidth - 2 * cornerRadius,
      boxHeight,
      boxDepth
    );
    const verticalBox = new THREE.Mesh(verticalBoxGeo, sideMat);
    verticalBox.castShadow = true;
    verticalBox.receiveShadow = true;
    iconGroup.add(verticalBox);
    
    // 四个圆角圆柱
    const cylinderGeo = new THREE.CylinderGeometry(
      cornerRadius, cornerRadius, boxDepth, 32, 1, false
    );
    cylinderGeo.rotateX(Math.PI / 2);
    
    const cornerPositions = [
      { x: (boxWidth - 2 * cornerRadius) / 2, y: (boxHeight - 2 * cornerRadius) / 2 },
      { x: -(boxWidth - 2 * cornerRadius) / 2, y: (boxHeight - 2 * cornerRadius) / 2 },
      { x: -(boxWidth - 2 * cornerRadius) / 2, y: -(boxHeight - 2 * cornerRadius) / 2 },
      { x: (boxWidth - 2 * cornerRadius) / 2, y: -(boxHeight - 2 * cornerRadius) / 2 }
    ];
    
    cornerPositions.forEach(pos =&gt; {
      const cylinder = new THREE.Mesh(cylinderGeo, sideMat);
      cylinder.position.set(pos.x, pos.y, 0);
      cylinder.castShadow = true;
      cylinder.receiveShadow = true;
      iconGroup.add(cylinder);
    });
    
    // 正面面板（带纹理）
    const frontPlaneGeo = new THREE.PlaneGeometry(boxWidth, boxHeight);
    const frontPlane = new THREE.Mesh(frontPlaneGeo, faceMat);
    frontPlane.position.z = boxDepth / 2 + 0.001;
    frontPlane.castShadow = true;
    frontPlane.receiveShadow = true;
    iconGroup.add(frontPlane);
    
    // 背面面板（带纹理）
    const backPlane = new THREE.Mesh(frontPlaneGeo, faceMat);
    backPlane.position.z = -boxDepth / 2 - 0.001;
    backPlane.rotateY(Math.PI);
    backPlane.castShadow = true;
    backPlane.receiveShadow = true;
    iconGroup.add(backPlane);
    
    scene.add(iconGroup);
    
    // 改进阴影: 添加一个半透明接受阴影的地面平面
    const shadowPlaneMat = new THREE.ShadowMaterial({ opacity: 0.45, color: 0x000000, transparent: true, side: THREE.DoubleSide });
    const shadowReceiver = new THREE.Mesh(
      new THREE.CircleGeometry(2.4, 24),
      shadowPlaneMat
    );
    shadowReceiver.rotation.x = -Math.PI / 2;
    shadowReceiver.position.y = -0.85;
    shadowReceiver.receiveShadow = true;
    scene.add(shadowReceiver);
    
    // 为了增加质感，增加一个辅助的微弱网格地板
    const gridHelper = new THREE.GridHelper(5, 20, 0x88aaff, 0x335588);
    gridHelper.position.y = -0.9;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.2;
    scene.add(gridHelper);
    
    // 动画循环
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    
    animate();
    
    // 窗口适配
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
      const width = container.clientWidth;
      const height = container.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    }
    
    // 重置旋转
    function resetRotation() {
      controls.reset();
    }
    
    // 初始化触发一次尺寸同步
    setTimeout(() => onWindowResize(), 100);
  </script>
</body>
</html>
